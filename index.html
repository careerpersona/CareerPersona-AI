<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareerPersona AI</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0A0A0F; color: #F1F1F5; font-family: Inter, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .logo { width: 60px; height: 60px; background: linear-gradient(135deg,#7C3AED,#06B6D4); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 20px; }
    h1 { font-size: 28px; font-weight: 800; background: linear-gradient(135deg,#7C3AED,#06B6D4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
    p { color: #7878A0; font-size: 14px; margin-bottom: 30px; }
    .btn { background: linear-gradient(135deg,#7C3AED,#9333EA); color: #fff; border: none; border-radius: 10px; padding: 14px 32px; font-size: 15px; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
  <div style="text-align:center; padding: 40px;">
    <div class="logo">🚀</div>
    <h1>CareerPersona AI</h1>
    <p>Your AI-powered career platform is launching soon!</p>
    <button class="btn" onclick="alert('Full app coming soon!')">Get Early Access</button>
  </div>
</body>
</html>
